# =============================================
# DAMIETTA SC — Netlify Configuration
# =============================================

[build]
  command = "node generate-indexes.js"
  publish = "."

# ===== HEADERS (Security + Performance) =====
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-XSS-Protection        = "1; mode=block"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"

# Cache fonts aggressively
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ===== REDIRECTS =====
[[redirects]]
  from  = "/home"
  to    = "/"
  status = 301

[[redirects]]
  from  = "/news"
  to    = "/news.html"
  status = 301

[[redirects]]
  from  = "/team"
  to    = "/team.html"
  status = 301

# ===== NETLIFY FORMS =====
# Forms are auto-detected from HTML data-netlify="true"
# Notifications configured in Netlify dashboard

# ===== FUNCTIONS =====
[functions]
  directory = "netlify/functions"
